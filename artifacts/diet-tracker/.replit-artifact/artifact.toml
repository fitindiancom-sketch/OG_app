kind = "mobile"
previewPath = "/"
title = "Diet Plan Manager"
version = "1.0.0"
id = "artifacts/diet-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20729

[services.development]
run = "pnpm --filter @workspace/diet-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diet-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/diet-tracker", "run", "serve" ]

[services.env]
PORT = "20729"
BASE_PATH = "/"
